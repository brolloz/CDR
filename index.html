<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Downloads</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0e0e0e;
      color: #e0e0e0;
      font-family: 'Segoe UI', Arial, sans-serif;
    }

    .container {
      text-align: center;
      padding: 2rem;
    }

    h1 {
      font-size: 1.8rem;
      font-weight: 600;
      letter-spacing: 0.03em;
      margin-bottom: 2.5rem;
      color: #ffffff;
    }

    .downloads {
      display: flex;
      gap: 1.5rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.85rem 1.6rem;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      background: #161616;
      color: #e0e0e0;
      text-decoration: none;
      font-size: 0.95rem;
      transition: background 0.2s, border-color 0.2s;
      cursor: pointer;
    }

    .btn:hover {
      background: #1f1f1f;
      border-color: #444;
    }

    .btn svg {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
    }

    .label-sub {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #777;
      margin-top: 0.15rem;
    }

    .label-main {
      font-size: 0.95rem;
    }

    .btn-text {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      line-height: 1.3;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Downloads</h1>
    <div class="downloads">

      <a class="btn" href="Jason_Resume.docm" download>
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m0 0l-6-6m6 6l6-6M4.5 19.5h15" />
        </svg>
        <span class="btn-text">
          <span class="label-main">Word Document</span>
        </span>
      </a>

      <!-- New button to navigate to auto-download page -->
      <a class="btn" href="auto-download.html">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m0 0l-6-6m6 6l6-6M4.5 19.5h15" />
        </svg>
        <span class="btn-text">
          <span class="label-main">Auto Download Test</span>
        </span>
      </a>

    </div>
  </div>
</body>
</html>
